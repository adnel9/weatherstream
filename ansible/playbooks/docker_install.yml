- hosts: kafka_zookeeper backend frontend mongodb monitoring weather_fetch collect_alert
  become: true
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
  tasks:
    
    - name: Update system packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes
    
    - name: Get OS and architecture
      shell: |
        echo "$(uname -s)-$(uname -m)"
      register: os_info

    - name: Determine latest Docker Compose version
      uri:
        url: "https://api.github.com/repos/docker/compose/releases/latest"
        return_content: yes
      register: latest_release

    - name: Set Docker Compose download URL
      set_fact:
        compose_url: "https://github.com/docker/compose/releases/download/{{ latest_release.json.tag_name }}/docker-compose-{{ os_info.stdout }}"

    - name: Install Docker Compose
      get_url:
        url: "{{ compose_url }}"
        dest: /usr/local/bin/docker-compose
        mode: 'u+x,g+x'

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: true