services:
  zookeeper:
    container_name: zookeeper-container
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "30"]
      interval: 10s
      timeout: 35s
      retries: 10
      start_period: 10s
    networks:
      - meteo-network  # Make sure Zookeeper is on the same network
    restart: unless-stopped  # Restart the container unless manually stopped

  kafka:
    container_name: kafka-container
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-container:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      EXTRA_ARGS: -javaagent:/opt/jmx_exporter/jmx_prometheus_javaagent-0.18.0.jar=7070:/opt/jmx_exporter/config.yml
      JMX_PORT: 2101
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=localhost -Dcom.sun.management.jmxremote.rmi.port=2101"
    volumes:
      - ./monitoring/exporters/jmx_exporter/:/opt/jmx_exporter
    healthcheck:
      test: ["CMD", "cub", "kafka-ready", "1", "30", "-b", "localhost:9092"]
      interval: 10s
      timeout: 35s
      retries: 10
      start_period: 60s
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - meteo-network  # Ensure Kafka is also on the same network
    restart: unless-stopped  # Restart the container unless manually stopped

  weather-fetch-server:
    image: weather-fetch-server
    build:
      context: ./weather-fetch-server
    container_name: weather-fetch-server
    networks:
      - meteo-network  # Use the common meteo-network
    environment:
      - KAFKA_BROKER=kafka:9092
      - ZOOKEEPER_HOST=zookeeper:2181
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - KAFKA_IP=${KAFKA_IP}
  
    ports:
      - "3001:3001"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped  # Restart the container unless manually stopped

  mongodb:
    container_name: mongo-container
    build:
      context: ./mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE_USER: ${MONGO_INITDB_DATABASE_USER}
      MONGO_INITDB_DATABASE_PASSWORD: ${MONGO_INITDB_DATABASE_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    # volumes:
    #   - mongo-data:/data/db  # Store MongoDB data persistently
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/27017'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - meteo-network

  locust-master:
    build:
      context: ./backend/locust/  # Assuming Dockerfile is in the same directory
    container_name: locust-master
    command: >
      -f /mnt/locustfile.py --master --host=http://backend-container:3000
    ports:
      - "8089:8089"  # Locust Web UI
    volumes:
      - ./backend/locust/scenarios:/mnt
    environment:
      - LOCUST_MODE=master
    networks:
      - meteo-network

  locust-worker:
    build:
      context: ./backend/locust/
    depends_on:
      - locust-master
    command: >
      -f /mnt/locustfile.py --worker --master-host=locust-master
    volumes:
      - ./backend/locust/scenarios:/mnt
    environment:
      - LOCUST_MODE=worker
    deploy:
      replicas: 4  # Adjust this number for more workers
    networks:
      - meteo-network

    
  backend:
    container_name: backend-container
    build:
      context: ./backend
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      MONGO_INITDB_DATABASE_USER: ${MONGO_INITDB_DATABASE_USER}
      MONGO_INITDB_DATABASE_PASSWORD: ${MONGO_INITDB_DATABASE_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      MONGODB_PRIVATE_IP: ${MONGODB_PRIVATE_IP}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      KAFKA_IP: ${KAFKA_IP}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    networks:
      - meteo-network  # Ensure backend is on the same network
    restart: unless-stopped  # Restart the container unless manually stopped
  
  frontend:
    container_name: frontend-container
    build:
      context: ./frontend
    ports:
      - "80:5173"
    environment:
      VITE_FRONTEND_URL: http://localhost
      VITE_BACKEND_URL: http://backend-container:3000
    depends_on:
      - backend
    networks:
      - meteo-network  # Ensure frontend is on the same network

  collect-server:
    container_name: collect-server-container
    build:
      context: ./collect-server
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_INITDB_DATABASE_USER: ${MONGO_INITDB_DATABASE_USER}
      MONGO_INITDB_DATABASE_PASSWORD: ${MONGO_INITDB_DATABASE_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      MONGODB_PRIVATE_IP: ${MONGODB_PRIVATE_IP}
      KAFKA_IP: ${KAFKA_IP}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    networks:
      - meteo-network
    restart: unless-stopped  # Restart the container unless manually stopped

  alert-server:
    container_name: alert-server-container
    build:
      context: ./alert-server
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      collect-server:
        condition: service_started
    environment:
      MONGO_INITDB_DATABASE_USER: ${MONGO_INITDB_DATABASE_USER}
      MONGO_INITDB_DATABASE_PASSWORD: ${MONGO_INITDB_DATABASE_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      MONGODB_PRIVATE_IP: ${MONGODB_PRIVATE_IP}
      KAFKA_IP: ${KAFKA_IP}
    networks:
      - meteo-network
    restart: unless-stopped  # Restart the container unless manually stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"  # Expose Prometheus UI on port 9090
    volumes:
      - ./monitoring/config/prometheus/prometheus-local.yml:/etc/prometheus/prometheus.yml  # Prometheus config file
      - ./monitoring/config/prometheus/rules.yml:/etc/prometheus/rules.yml # Prometheus rules
      - prometheus-data:/prometheus  # Persist Prometheus data
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - meteo-network 
  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    container_name: grafana
    ports:
      - "3002:3000"  # Expose Grafana UI on port 80
    volumes:
      - grafana-data:/var/lib/grafana  # Persist Grafana data 
      - ./monitoring/config/grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/  # Mounting the directory containing both the data source
      - ./monitoring/config/grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/  # Mounting the directory containing both the dashboard
    restart: unless-stopped
    networks:
      - meteo-network 
  cadvisor:
    # cadvisor exporter
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro  # Root filesystem for host metrics
      - /var/run:/var/run:ro  # Access to Docker runtime data
      - /sys:/sys:ro  # System information
      - /var/lib/docker/:/var/lib/docker:ro  # Docker metadata
      - /dev/disk/:/dev/disk:ro  # Disk information
    devices:
      - /dev/kmsg  # Access to kernel messages
    restart: unless-stopped
    networks:
      - meteo-network
  node_exporter:
    # node exporter
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    restart: unless-stopped
    volumes:
      - '/:/host:ro'
    command:
      - '--path.rootfs=/host'
    networks:
      - meteo-network 
  mongo_exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongo_exporter
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
    command: ["--collect-all", "--compatible-mode", "--discovering-mode"]
    ports:
        - "9216:9216"
    networks:
      - meteo-network 

  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/config/alertmanager/:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    restart:
      always
    networks:
      - meteo-network 

networks:
  meteo-network:
    name: meteo-network  # Define the network for all services to use

# This will persist the MongoDB data between container restarts.
volumes:
  # mongo-data:
  prometheus-data:  # Volume for Prometheus data
    driver: local
  grafana-data:  # Volume for Grafana data
    driver: local