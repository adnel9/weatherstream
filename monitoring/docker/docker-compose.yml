services:
   prometheus:
      image: prom/prometheus:latest
      container_name: prometheus
      ports:
         - "9090:9090"  # Expose Prometheus UI on port 9090
      volumes:
         - ../config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml  # Prometheus config file
         - ../config/prometheus/rules.yml:/etc/prometheus/rules.yml # Prometheus rules
         - prometheus-data:/prometheus  # Persist Prometheus data
      restart: unless-stopped
      command:
         - "--config.file=/etc/prometheus/prometheus.yml"

   grafana:
      image: grafana/grafana:latest
      depends_on:
         - prometheus
      container_name: grafana
      ports:
         - "80:3000"  # Expose Grafana UI on port 80
      volumes:
         - grafana-data:/var/lib/grafana  # Persist Grafana data 
         - ../config/grafana/provisioning/datasources/:/etc/grafana/provisioning/datasources/  # Mounting the directory containing both the data source
         - ../config/grafana/provisioning/dashboards/:/etc/grafana/provisioning/dashboards/  # Mounting the directory containing both the dashboard
      restart: unless-stopped

   cadvisor:
      # cadvisor exporter
      image: gcr.io/cadvisor/cadvisor:latest
      container_name: cadvisor
      volumes:
         - /:/rootfs:ro  # Root filesystem for host metrics
         - /var/run:/var/run:ro  # Access to Docker runtime data
         - /sys:/sys:ro  # System information
         - /var/lib/docker/:/var/lib/docker:ro  # Docker metadata
         - /dev/disk/:/dev/disk:ro  # Disk information
      devices:
         - /dev/kmsg  # Access to kernel messages
      restart: unless-stopped
   
   node_exporter:
      # node exporter
      image: quay.io/prometheus/node-exporter:latest
      container_name: node_exporter
      restart: unless-stopped
      volumes:
         - '/:/host:ro,rslave'
      command:
         - '--path.rootfs=/host'

   alertmanager:
      image: prom/alertmanager
      container_name: alertmanager
      ports:
         - "9093:9093"
      volumes:
         - ../config/alertmanager/:/etc/alertmanager
      command:
         - '--config.file=/etc/alertmanager/alertmanager.yml'
      restart:
         always

volumes:
   prometheus-data:  # Volume for Prometheus data
      driver: local
   grafana-data:  # Volume for Grafana data
      driver: local